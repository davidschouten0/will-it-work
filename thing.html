<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0a0a0a; color: #00ff00; margin: 0 auto; max-width: 430px; height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        #console { font-size: 14px; line-height: 1.5; margin-bottom: 30px; min-height: 150px; }
        button { background: transparent; color: #00ff00; border: 1px solid #00ff00; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        button:active { background: #00ff00; color: #000; }
    </style>
</head>
<body>
    <div id="console">> Awaiting input...</div>
    <button id="runBtn">Execute Sequence</button>

    <script>
        const lines = [
            "> Analyzing Hinge conversation...",
            "> Calculating mutual vibe...",
            "> Vibe check passed.",
            "> Generating optimal rendezvous...",
            "> RESULT: Drinks. This week.",
            "> Action required: Text him back."
        ];
        
        document.getElementById('runBtn').addEventListener('click', function() {
            this.style.display = 'none';
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML = '';
            let i = 0;
            const interval = setInterval(() => {
                if(i < lines.length) {
                    consoleDiv.innerHTML += lines[i] + '<br>';
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 800);
        });
    </script>
</body>
</html>
